name: Angular Frontend CI/CD

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # PASO CLAVE: Crear el archivo environment.ts que el compilador necesita
      - name: Setup Environment Files
        run: |
          mkdir -p src/environments
          cp src/environments/environment.example src/environments/environment.ts
          # También lo creamos para producción por si acaso
          cp src/environments/environment.example src/environments/environment.prod.ts

      - name: Build Project
        run: npm run build -- --configuration=production

      - name: Deployment Summary
        run: |
          echo "### Angular Build Status 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Build successful using environment mocks." >> $GITHUB_STEP_SUMMARY